<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Student Recovery Planner</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <h1>Dashboard</h1>
  <p>Welcome to Student Recovery Planner.</p>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Today's Overview</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <p>Overdue tasks: 0</p>
      <p>Tasks due this week: 0</p>
      <p>Completed tasks: 0</p>
    </ion-card-content>
  </ion-card>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Quick Navigation</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <div class="nav-buttons">
        <ion-button expand="block" routerLink="/modules">Modules</ion-button>
        <ion-button expand="block" routerLink="/planner">Planner</ion-button>
        <ion-button expand="block" routerLink="/progress">Progress</ion-button>
        <ion-button expand="block" routerLink="/settings">Settings</ion-button>
      </div>
    </ion-card-content>
  </ion-card>
</ion-content>
